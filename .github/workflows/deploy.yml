name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python (syntax check)
        run: |
          pip install pyflakes
          python -m pyflakes app/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/fittrack
            cd "$APP_DIR"

            # Preserve .env (managed on VPS, never committed)
            cp .env /tmp/.env.deploy.bak 2>/dev/null || true

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Restore .env after reset
            cp /tmp/.env.deploy.bak .env 2>/dev/null || true

            # ── Python backend ────────────────────────────────────────────
            python3 -m venv venv 2>/dev/null || true
            source venv/bin/activate
            pip install -r requirements.txt -q
            deactivate

            # ── Next.js frontend ──────────────────────────────────────────
            # Bake the public server URL into the frontend build
            FRONTEND_URL=$(grep '^FRONTEND_URL=' .env | cut -d= -f2- | tr -d '[:space:]')
            cd frontend
            npm ci --prefer-offline
            NEXT_PUBLIC_API_BASE_URL="$FRONTEND_URL" npm run build
            cd ..

            # ── Restart processes via PM2 ─────────────────────────────────
            # Backend (uvicorn)
            if pm2 describe fittrack-backend > /dev/null 2>&1; then
              pm2 restart fittrack-backend --update-env
            else
              pm2 start "$APP_DIR/venv/bin/uvicorn" \
                --name fittrack-backend \
                --cwd "$APP_DIR" \
                -- app.main:app --host 127.0.0.1 --port 8000
            fi

            # Frontend (Next.js)
            if pm2 describe fittrack-frontend > /dev/null 2>&1; then
              pm2 restart fittrack-frontend
            else
              pm2 start npm \
                --name fittrack-frontend \
                --cwd "$APP_DIR/frontend" \
                -- start
            fi

            pm2 save

            # ── Reload nginx ──────────────────────────────────────────────
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deploy complete — $(date)"
